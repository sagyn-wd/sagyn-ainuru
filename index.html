<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на торжество | Сагын & Айнуру</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; background: radial-gradient(circle at 50% 40%, #fff8f9 0%, #fbe1e8 60%, #dfdaf5 100%); background-attachment: fixed; color: #2A2F35; font-family: 'Cormorant Garamond', serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .rose-petal { position: fixed; top: -50px; pointer-events: none; will-change: transform, top, opacity; background: radial-gradient(circle at 35% 25%, #fff1f3 0%, #ffa6be 50%, #f27d9a 100%); border-radius: 50% 50% 45% 45% / 40% 40% 60% 60%; box-shadow: inset -3px -3px 7px rgba(210, 100, 125, 0.45), inset 3px 3px 6px rgba(255, 255, 255, 0.9), 0 12px 25px rgba(160, 110, 120, 0.18); animation: petalFall linear infinite, petalSway ease-in-out infinite; }
        @keyframes petalFall { 0% { top: -50px; opacity: 0; } 10% { opacity: 0.95; } 90% { opacity: 0.90; } 100% { top: 105vh; opacity: 0; } }
        @keyframes petalSway { 0% { transform: translateX(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg); } 25% { transform: translateX(45px) rotateX(65deg) rotateY(45deg) rotateZ(35deg); } 50% { transform: translateX(-35px) rotateX(135deg) rotateY(160deg) rotateZ(85deg); } 100% { transform: translateX(-10px) rotateX(180deg) rotateY(360deg) rotateZ(210deg); } }
        .petal-particle { position: fixed; pointer-events: none; z-index: 10001; will-change: transform, opacity; background: radial-gradient(circle at 35% 30%, #ffffff 10%, #ffdae2 60%, #ffb3c6 100%); border-radius: 50% 55% 45% 50% / 40% 40% 60% 60%; opacity: 1; transition: transform 2.8s cubic-bezier(0.075, 0.82, 0.165, 1), opacity 2.8s ease-out; }
        #envelope-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 40%, #fff8f9 0%, #fbe1e8 60%, #dfdaf5 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; cursor: pointer; }
        .envelope { display: flex !important; flex-direction: column; justify-content: center; align-items: center; position: relative; width: 440px !important; height: 280px !important; max-width: 92%; background: #FFFFFF !important; box-shadow: 0 40px 90px rgba(170, 135, 145, 0.25) !important; border-radius: 16px; border: 1px solid rgba(220, 210, 195, 0.6); z-index: 10; }
        .heart-seal-text { position: relative; z-index: 2; color: #F9E7B9; font-family: 'Great Vibes', cursive; font-weight: bold; font-size: 2.1rem; text-shadow: 1px 2px 4px rgba(0,0,0,0.18); margin-top: -6px; }
        .envelope-text { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: #8A8475; font-weight: 500; margin-top: 20px; }
        #cozy-music-bar { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: rgba(255, 255, 255, 0.93); border: 1px solid rgba(158, 132, 84, 0.25); padding: 10px 24px; border-radius: 30px; display: flex; align-items: center; gap: 12px; box-shadow: 0 12px 35px rgba(160, 130, 140, 0.12); z-index: 1000; cursor: pointer; backdrop-filter: blur(4px); }
        .page { display: none; position: absolute; top: 0; left: 0; width: 100%; min-height: 100%; padding: 105px 20px 40px 20px; text-align: center; justify-content: center; align-items: center; flex-direction: column; opacity: 0; z-index: 5; }
        .page.active { display: flex !important; animation: fadeInPage 0.5s ease-out forwards; }
        @keyframes fadeInPage { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .content-card { width: 100%; max-width: 520px; margin: auto; padding: 45px 30px; background: rgba(255, 255, 255, 0.98); border: 1px solid rgba(158, 132, 84, 0.2); box-shadow: 0 25px 70px rgba(170, 130, 145, 0.12); border-radius: 4px; position: relative; }
        h2 { font-size: 1.65rem; color: #9E8454; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 22px; font-weight: 400; }
        .invitation-text { font-size: 1.15rem; line-height: 1.75; font-style: italic; color: #3A4047; margin-bottom: 12px; }
        .couple-names { font-family: 'Great Vibes', cursive; font-size: 3.5rem; color: #9E8454; margin: 15px 0; }
        .hosts-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; border-top: 1px dashed rgba(158, 132, 84, 0.2); padding-top: 15px; }
        .hosts-block { display: flex; flex-direction: column; align-items: center; }
        .hosts-title { font-family: 'Great Vibes', cursive; font-size: 1.8rem; color: #9E8454; }
        .hosts-names { font-size: 1.4rem; letter-spacing: 0.5px; font-weight: 600; color: #2A2F35; margin-top: 2px; }
        .hosts-status { font-size: 0.9rem; font-style: italic; color: #8A8475; }
        .nav-box { display: flex; justify-content: center; gap: 12px; margin-top: 35px; width: 100%; position: relative; z-index: 100; }
        .btn-nav { padding: 12px 30px; background: #FFFFFF; border: 1px solid #9E8454; color: #9E8454; font-family: 'Montserrat', sans-serif; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; text-decoration: none; font-weight: 500; }
        .btn-nav:hover { background: #9E8454; color: #FFFFFF; }
        .timer-grid { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .timer-item { background: #FFFFFF; border: 1px solid #EFEAE0; padding: 12px; min-width: 72px; border-radius: 4px; }
        .timer-num { font-size: 1.6rem; color: #2A2F35; font-weight: 600; }
        .timer-label { font-family: 'Montserrat', sans-serif; font-size: 0.55rem; color: #8A94A0; text-transform: uppercase; letter-spacing: 1px; }
        .timeline-container { text-align: left; margin: 15px auto 5px auto; max-width: 420px; }
        .timeline-item { display: flex; margin-bottom: 14px; }
        .timeline-time { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 600; color: #9E8454; min-width: 55px; padding-top: 2px; }
        .timeline-text { font-size: 1.1rem; color: #333; line-height: 1.3; }
        .dc-badge { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; color: #9E8454; font-weight: 600; margin: 15px 0; display: inline-block; border-bottom: 1px solid #9E8454; padding-bottom: 4px; }
        .wish-input, .wish-text { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #E2DCD0; background: #FFFFFF; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; outline: none; border-radius: 2px; }
        .wish-text { height: 80px; resize: none; }
        .wishes-output { max-height: 140px; overflow-y: auto; text-align: left; font-size: 0.9rem; margin-top: 15px; }
        .wish-item { padding: 10px; border-left: 2px solid #9E8454; background: #FAFAFA; margin-bottom: 6px; font-style: italic; }
    </style>
</head>
<body>
    <audio id="wedding-audio" loop preload="auto"></audio>
    <div id="cozy-music-bar" onclick="toggleAudio(event)">
        <span class="music-bar-text" id="music-status-text">Включить музыку</span>
        <div class="music-btn-circle" id="music-icon">🎵</div>
    </div>
    <div id="envelope-screen" onclick="openEnvelope()">
        <div class="envelope">
            <div class="heart-seal-wrapper">
                <div class="heart-seal-text">S&A</div>
            </div>
            <div class="envelope-text">Нажмите, чтобы открыть</div>
        </div>
    </div>

    <!-- Страница 1 -->
    <div id="page1" class="page">
        <div class="content-card">
            <h2 id="guest-title-heading">Дорогие Гости</h2>
            <div class="hosts-container">
                <div class="hosts-block">
                    <div class="hosts-title">Хозяева торжества</div>
                    <div class="hosts-names">Арстан & Нурайым</div>
                    <div class="hosts-status">(Родители жениха)</div>
                </div>
                <div class="hosts-block">
                    <div class="hosts-names">Муктарбек & Шаарбу</div>
                    <div class="hosts-status">(Родители невесты)</div>
                </div>
            </div>
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(2)">Далее</button></div>
        </div>
    </div>

    <!-- Страница 2 -->
    <div id="page2" class="page">
        <div class="content-card">
            <h2>До торжества осталось</h2>
            <p style="font-size: 1.3rem; font-weight: 600; color: #9E8454; margin: 20px 0;">31 июля 2026 года в 17:00</p>
            <div class="timer-grid">
                <div class="timer-item"><div class="timer-num" id="days">00</div><div class="timer-label">Дней</div></div>
                <div class="timer-item"><div class="timer-num" id="hours">00</div><div class="timer-label">Часов</div></div>
                <div class="timer-item"><div class="timer-num" id="minutes">00</div><div class="timer-label">Мин</div></div>
                <div class="timer-item"><div class="timer-num" id="seconds">00</div><div class="timer-label">Сек</div></div>
            </div>
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(1)">Назад</button><button class="btn-nav" onclick="navigateToPage(3)">Далее</button></div>
        </div>
    </div>

    <!-- Страница 3 -->
    <div id="page3" class="page">
        <div class="content-card">
            <h2>Книга пожеланий</h2>
            <input type="text" id="author" class="wish-input" placeholder="Ваше Имя">
            <textarea id="text" class="wish-text" placeholder="Ваши пожелания..."></textarea>
            <button id="send-wish-btn" onclick="saveWish()" class="btn-nav" style="width:100%; background:#9E8454; color:#fff;">Отправить</button>
            <div class="wishes-output" id="output-box"></div>
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(2)">Назад</button></div>
        </div>
    </div>

    <script>
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxdr3mtmmYLT0S-aoecD4iV2QQmCvYo3BhrvDEsO1rLpw4CH2Oy7DOqCtIBwOCCeMBDMg/exec"; 
        
        function openEnvelope() {
            document.getElementById('envelope-screen').style.display = 'none';
            navigateToPage(1);
        }
        function navigateToPage(num) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            let activePage = document.getElementById('page' + num);
            if (activePage) activePage.classList.add('active');
        }
        function saveWish() {
            let name = document.getElementById('author').value.trim();
            let wish = document.getElementById('text').value.trim();
            if(!name || !wish) return alert('Заполните поля!');
            alert('Ваше пожелание принято!');
            document.getElementById('author').value = '';
            document.getElementById('text').value = '';
        }
        setInterval(() => {
            const diff = new Date('July 31, 2026 17:00:00').getTime() - new Date().getTime();
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000*60*60*24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                document.getElementById('minutes').innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
                document.getElementById('seconds').innerText = Math.floor((diff % (1000*60)) / 1000);
            }
        }, 1000);
    </script>
</body>
</html>
