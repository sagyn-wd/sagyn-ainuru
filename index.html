<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на торжество | Сагын & Айнуру</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        /* Здесь идут все ваши 300+ строк стилей ( petalFall, petalSway и т.д. ) */
        /* [ ... ОСТАВЛЕНО БЕЗ ИЗМЕНЕНИЙ ИЗ ВАШЕГО ИСХОДНИКА ... ] */
        
        .hosts-title { font-family: 'Great Vibes', cursive; font-size: 1.8rem; color: #9E8454; } /* ВНЕСЕНА ПРАВКА */
    </style>
</head>
<body>
    <!-- [ ... ВАШ ОРИГИНАЛЬНЫЙ HTML КОНВЕРТА И МУЗЫКИ ... ] -->
    
    <!-- Page 1 -->
    <div id="page1" class="page active">
        <div class="content-card">
            <h2>Дорогие Гости</h2>
            <!-- [ ... ВАШ ОРИГИНАЛЬНЫЙ ТЕКСТ ... ] -->
            <div class="hosts-container">
                <div class="hosts-block">
                    <div class="hosts-title">Хозяева торжества</div>
                    <div class="hosts-names">Арстан & Нурайым</div>
                    <div class="hosts-status">(Родители жениха)</div>
                </div>
                <div class="hosts-block">
                    <div class="hosts-names">Муктарбек & Шаарбу</div>
                    <div class="hosts-status">(Родители невесты)</div>
                </div>
            </div>
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(2)">Далее</button></div>
        </div>
    </div>

    <!-- Page 2 (Сюда перенесена дата) -->
    <div id="page2" class="page">
        <div class="content-card">
            <h2>До торжества осталось</h2>
            <p style="font-size: 1.3rem; font-weight: 600; color: #9E8454; margin: 20px 0;">31 июля 2026 года в 17:00</p>
            <div class="timer-grid">
                <!-- [ ... ОСТАЛЬНОЙ ВАШ ТАЙМЕР ... ] -->
            </div>
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(1)">Назад</button><button class="btn-nav" onclick="navigateToPage(3)">Далее</button></div>
        </div>
    </div>

    <!-- Страница 3, 4, 5, 7 (Страница 6 с загрузкой фото удалена) -->
    <div id="page3" class="page">
        <div class="content-card">
            <h2>Программа вечера</h2>
            <!-- [ ... ВАШ ОРИГИНАЛЬНЫЙ ТЕКСТ ТАЙМИНГА ... ] -->
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(2)">Назад</button><button class="btn-nav" onclick="navigateToPage(4)">Далее</button></div>
        </div>
    </div>

    <div id="page4" class="page">
        <div class="content-card">
            <h2>Пожелания к стилю</h2>
            <!-- [ ... ВАШ ОРИГИНАЛЬНЫЙ ТЕКСТ DRESS CODE ... ] -->
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(3)">Назад</button><button class="btn-nav" onclick="navigateToPage(5)">Далее</button></div>
        </div>
    </div>

    <div id="page5" class="page">
        <div class="content-card">
            <h2>Адрес торжества</h2>
            <!-- [ ... ВАШ ОРИГИНАЛЬНЫЙ ТЕКСТ АДРЕСА ... ] -->
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(4)">Назад</button><button class="btn-nav" onclick="navigateToPage(7)">Далее</button></div>
        </div>
    </div>

    <div id="page7" class="page">
        <div class="content-card">
            <h2>Книга пожеланий</h2>
            <input type="text" id="author" class="wish-input" placeholder="Ваше Имя">
            <textarea id="text" class="wish-text" placeholder="Ваши изысканные пожелания..."></textarea>
            <button id="send-wish-btn" onclick="saveWish()" class="btn-nav" style="width:100%; background:#9E8454; color:#fff;">Оставить пожелание</button>
            <div class="wishes-output" id="output-box"></div>
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(5)">Назад</button></div>
        </div>
    </div>

    <script>
        /* [ ... ВСЕ ВАШИ ОРИГИНАЛЬНЫЕ ФУНКЦИИ JS: openEnvelope, navigateToPage, toggleAudio, saveWish ... ] */
        
        /* ВАЖНО: Весь блок uploadPhotosToServer из вашего файла удален */
        
        /* [ ... ОСТАЛЬНАЯ ЛОГИКА ТАЙМЕРА И АНИМАЦИЙ ПЕТАЛОВ БЕЗ ИЗМЕНЕНИЙ ... ] */
        
        const weddingDate = new Date('July 31, 2026 17:00:00').getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
            }
        }, 1000);
    </script>
</body>
</html>
