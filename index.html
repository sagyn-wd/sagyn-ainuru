<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на торжество | Сагын & Айнуру</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Montserrat:wght@300;400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; background: radial-gradient(circle at 50% 40%, #fff3f5 0%, #fce4ec 60%, #e3d5f7 100%); background-attachment: fixed; color: #2A2F35; font-family: 'Cormorant Garamond', serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }
        .rose-petal { position: fixed; top: -50px; pointer-events: none; will-change: transform, top, opacity; background: radial-gradient(circle at 35% 25%, #fff1f3 0%, #ffa6be 50%, #f27d9a 100%); border-radius: 50% 50% 45% 45% / 40% 40% 60% 60%; box-shadow: inset -3px -3px 7px rgba(210, 100, 125, 0.45), inset 3px 3px 6px rgba(255, 255, 255, 0.9), 0 12px 25px rgba(160, 110, 120, 0.18); animation: petalFall linear infinite, petalSway ease-in-out infinite; }
        @keyframes petalFall { 0% { top: -50px; opacity: 0; } 10% { opacity: 0.95; } 90% { opacity: 0.90; } 100% { top: 105vh; opacity: 0; } }
        @keyframes petalSway { 0% { transform: translateX(0) rotateX(0deg) rotateY(0deg) rotateZ(0deg); } 25% { transform: translateX(45px) rotateX(65deg) rotateY(45deg) rotateZ(35deg); } 50% { transform: translateX(-35px) rotateX(135deg) rotateY(160deg) rotateZ(85deg); } 75% { transform: translateX(30px) rotateX(75deg) rotateY(290deg) rotateZ(140deg); } 100% { transform: translateX(-10px) rotateX(180deg) rotateY(360deg) rotateZ(210deg); } }
        #envelope-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 40%, #fff3f5 0%, #fce4ec 60%, #e3d5f7 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 99999; cursor: pointer; }
        .envelope { display: flex; flex-direction: column; justify-content: center; align-items: center; width: 440px; height: 280px; max-width: 92%; background: #FFFFFF; box-shadow: 0 40px 90px rgba(170, 135, 145, 0.25); border-radius: 16px; border: 1px solid rgba(220, 210, 195, 0.6); z-index: 10; }
        .heart-seal-text { font-family: 'Great Vibes', cursive; font-size: 2.1rem; color: #F9E7B9; text-shadow: 1px 2px 4px rgba(0,0,0,0.18); }
        .envelope-text { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; letter-spacing: 3px; text-transform: uppercase; color: #8A8475; margin-top: 20px; }
        .page { display: none; position: absolute; top: 0; left: 0; width: 100%; min-height: 100%; padding: 105px 20px 40px 20px; text-align: center; justify-content: center; align-items: center; flex-direction: column; opacity: 0; z-index: 5; }
        .page.active { display: flex; animation: fadeInPage 0.5s ease-out forwards; }
        @keyframes fadeInPage { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .content-card { width: 100%; max-width: 520px; padding: 45px 30px; background: rgba(255, 255, 255, 0.98); border: 1px solid rgba(158, 132, 84, 0.2); border-radius: 4px; }
        h2 { font-size: 1.65rem; color: #9E8454; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 22px; }
        .hosts-title { font-family: 'Great Vibes', cursive; font-size: 1.8rem; color: #9E8454; margin-bottom: 10px; }
        .hosts-names { font-size: 1.4rem; font-weight: 600; color: #2A2F35; margin-top: 5px; }
        .nav-box { display: flex; justify-content: center; gap: 12px; margin-top: 35px; }
        .btn-nav { padding: 12px 30px; background: #FFFFFF; border: 1px solid #9E8454; color: #9E8454; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px; }
        .timer-grid { display: flex; justify-content: center; gap: 10px; margin: 25px 0; }
        .timer-item { background: #FFFFFF; border: 1px solid #EFEAE0; padding: 12px; min-width: 72px; }
        .timer-num { font-size: 1.6rem; color: #2A2F35; font-weight: 600; }
        .timer-label { font-size: 0.55rem; color: #8A94A0; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="envelope-screen" onclick="openEnvelope()">
        <div class="envelope">
            <div class="heart-seal-text">S&A</div>
            <div class="envelope-text">Нажмите, чтобы открыть</div>
        </div>
    </div>

    <!-- Страница 1 -->
    <div id="page1" class="page active">
        <div class="content-card">
            <h2>Дорогие Гости</h2>
            <div class="hosts-title">Хозяева торжества</div>
            <div class="hosts-names">Арстан & Нурайым</div>
            <div class="hosts-names" style="margin-top: 20px;">Муктарбек & Шаарбу</div>
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(2)">Далее</button></div>
        </div>
    </div>

    <!-- Страница 6 (Таймер) -->
    <div id="page6" class="page">
        <div class="content-card">
            <h2>До торжества осталось</h2>
            <p style="font-size: 1.3rem; font-weight: 600; color: #9E8454; margin: 20px 0;">31 июля 2026 года в 17:00</p>
            <div class="timer-grid">
                <div class="timer-item"><div class="timer-num" id="days">00</div><div class="timer-label">Дней</div></div>
                <div class="timer-item"><div class="timer-num" id="hours">00</div><div class="timer-label">Часов</div></div>
                <div class="timer-item"><div class="timer-num" id="minutes">00</div><div class="timer-label">Мин</div></div>
                <div class="timer-item"><div class="timer-num" id="seconds">00</div><div class="timer-label">Сек</div></div>
            </div>
            <div class="nav-box"><button class="btn-nav" onclick="navigateToPage(5)">Назад</button></div>
        </div>
    </div>
    <script>
        function openEnvelope() { document.getElementById('envelope-screen').style.display = 'none'; }
        function navigateToPage(num) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            const target = document.getElementById('page' + num);
            if(target) target.classList.add('active');
        }
        setInterval(() => {
            const diff = new Date('July 31, 2026 17:00:00').getTime() - new Date().getTime();
            if (diff > 0) {
                document.getElementById('days').innerText = Math.floor(diff / (1000*60*60*24));
                document.getElementById('hours').innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
                document.getElementById('minutes').innerText = Math.floor((diff % (1000*60*60)) / (1000*60));
                document.getElementById('seconds').innerText = Math.floor((diff % (1000*60)) / 1000);
            }
        }, 1000);
    </script>
</body>
</html>
